server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: community-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-holy-dream-aniux2tl-pooler.c-6.us-east-1.aws.neon.tech/community_db?sslmode=require&channelBinding=require}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    # On réutilise les mêmes variables d'environnement que le datasource
    url: ${DB_URL}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    # Emplacement par défaut, mais c'est bien de le préciser
    locations: classpath:db/migration
    # Optionnel : Si votre BDD n'est pas vide et que vous voulez que Flyway ignore l'existant
    # baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

realtime:
  websocket:
    allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:*}

integration:
  entity:
    base-url: ${ENTITY_BASE_URL:http://localhost:8081}
    permission-check-path: ${ENTITY_PERMISSION_CHECK_PATH:/api/v1/internal/entities/{entiteId}/permissions/check}
    connect-timeout-ms: ${ENTITY_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${ENTITY_READ_TIMEOUT_MS:5000}
  notification:
    base-url: ${NOTIFICATION_BASE_URL:http://localhost:8087}
    connect-timeout-ms: ${NOTIFICATION_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${NOTIFICATION_READ_TIMEOUT_MS:5000}

security:
  jwt:
    secret: ${JWT_SECRET_BASE64}
    issuer: ${JWT_ISSUER:fast-link-identity}

logging:
  level:
    org.springframework.web: INFO
