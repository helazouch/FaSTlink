server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: community-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-holy-dream-aniux2tl-pooler.c-6.us-east-1.aws.neon.tech/community_db?sslmode=require&channelBinding=require}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

realtime:
  websocket:
    allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:*}

logging:
  level:
    org.springframework.web: INFO
