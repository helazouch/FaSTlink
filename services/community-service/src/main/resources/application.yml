server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: community-service

  datasource:
    # BUG FIX: default was pointing to ep-holy-dream (event-service endpoint). Correct endpoint: ep-jolly-mouse.
    url: ${DB_URL:jdbc:postgresql://ep-jolly-mouse-amjbwuxz-pooler.c-5.us-east-1.aws.neon.tech/community_db?sslmode=require&channelBinding=require}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:false}
    ignore-migration-patterns: ${SPRING_FLYWAY_IGNORE_MIGRATION_PATTERNS:*:missing}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

realtime:
  websocket:
    allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:*}

logging:
  level:
    org.springframework.web: INFO
