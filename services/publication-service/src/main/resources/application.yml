server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: publication-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-summer-field-amn2wvfd-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring:
        json:
          add:
            type:
              headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

integration:
  entity:
    base-url: ${ENTITY_BASE_URL:http://localhost:8081}
    permission-check-path: ${ENTITY_PERMISSION_CHECK_PATH:/api/v1/internal/entities/{entiteId}/permissions/check}
    connect-timeout-ms: ${ENTITY_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${ENTITY_READ_TIMEOUT_MS:5000}

messaging:
  topics:
    publication-created: ${PUBLICATION_TOPIC_CREATED:fastlink.publication.created.v1}

logging:
  level:
    org.springframework.web: INFO
