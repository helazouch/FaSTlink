server:
  port: ${SERVER_PORT:8088}

spring:
  application:
    name: analytics-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/analytics_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    # On réutilise les mêmes variables d'environnement que le datasource
    url: ${DB_URL}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    # Emplacement par défaut, mais c'est bien de le préciser
    locations: classpath:db/migration
    # Optionnel : Si votre BDD n'est pas vide et que vous voulez que Flyway ignore l'existant
    # baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:analytics-service}
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      missing-topics-fatal: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

messaging:
  topics:
    publication-created: ${PUBLICATION_TOPIC_CREATED:fastlink.publication.created.v1}
    event-created: ${EVENT_TOPIC_CREATED:fastlink.event.created.v1}
    request-submitted: ${REQUEST_TOPIC_SUBMITTED:fastlink.request.submitted.v1}
    request-approved: ${REQUEST_TOPIC_APPROVED:fastlink.request.approved.v1}
    request-rejected: ${REQUEST_TOPIC_REJECTED:fastlink.request.rejected.v1}
    member-assigned: ${ENTITY_TOPIC_MEMBER_ASSIGNED:fastlink.entity.member.assigned.v1}

integration:
  entity:
    base-url: ${ENTITY_BASE_URL:http://localhost:8081}
    permission-check-path: ${ENTITY_PERMISSION_CHECK_PATH:/api/v1/internal/entities/{entiteId}/permissions/check}
    connect-timeout-ms: ${ENTITY_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${ENTITY_READ_TIMEOUT_MS:5000}
  platform:
    identity-base-url: ${IDENTITY_BASE_URL:http://localhost:8080}
    entity-base-url: ${ENTITY_BASE_URL:http://localhost:8081}
    publication-base-url: ${PUBLICATION_BASE_URL:http://localhost:8082}
    event-base-url: ${EVENT_BASE_URL:http://localhost:8083}
    community-base-url: ${COMMUNITY_BASE_URL:http://localhost:8084}
    notification-base-url: ${NOTIFICATION_BASE_URL:http://localhost:8087}
    connect-timeout-ms: ${PLATFORM_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${PLATFORM_READ_TIMEOUT_MS:5000}

security:
  jwt:
    secret: ${JWT_SECRET_BASE64}
    issuer: ${JWT_ISSUER:fast-link-identity}

logging:
  level:
    org.springframework.web: INFO
