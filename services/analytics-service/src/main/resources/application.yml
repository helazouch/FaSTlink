server:
  port: ${SERVER_PORT:8088}

spring:
  application:
    name: analytics-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/analytics_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    # On réutilise les mêmes variables d'environnement que le datasource
    url: ${DB_URL}
    user: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    # Emplacement par défaut, mais c'est bien de le préciser
    locations: classpath:db/migration
    # Optionnel : Si votre BDD n'est pas vide et que vous voulez que Flyway ignore l'existant
    # baseline-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:analytics-service}
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      missing-topics-fatal: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

messaging:
  topics:
    publication-created: ${PUBLICATION_TOPIC_CREATED:fastlink.publication.created.v1}
    event-created: ${EVENT_TOPIC_CREATED:fastlink.event.created.v1}
    request-submitted: ${REQUEST_TOPIC_SUBMITTED:fastlink.request.submitted.v1}
    request-approved: ${REQUEST_TOPIC_APPROVED:fastlink.request.approved.v1}
    request-rejected: ${REQUEST_TOPIC_REJECTED:fastlink.request.rejected.v1}
    member-assigned: ${ENTITY_TOPIC_MEMBER_ASSIGNED:fastlink.entity.member.assigned.v1}

logging:
  level:
    org.springframework.web: INFO
