server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: identity-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-summer-field-amn2wvfd-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    # validate-on-migrate=false: V4 was modified after its first execution on Neon (checksum mismatch).
    # Migrations that were already applied are never re-executed; Hibernate ddl-auto:validate
    # still verifies the schema matches the JPA entities, so data integrity is preserved.
    validate-on-migrate: ${SPRING_FLYWAY_VALIDATE_ON_MIGRATE:false}
    # Ignore migrations recorded in flyway_schema_history on Neon that no longer exist in this repo (e.g. V5).
    ignore-migration-patterns: ${SPRING_FLYWAY_IGNORE_MIGRATION_PATTERNS:*:missing}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

security:
  jwt:
    secret: ${JWT_SECRET_BASE64:QjBqbW16RTV5Kzl2ejRmbWl6WDJ3Vnh3QlM0YmI4M2Q2a2pQd2dQWGNiOD0=}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    issuer: ${JWT_ISSUER:fast-link-identity}

logging:
  level:
    org.springframework.security: INFO
