server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: entity-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://ep-summer-field-amn2wvfd-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require}
    username: ${DB_USERNAME:neondb_owner}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    properties:
      spring:
        json:
          add:
            type:
              headers: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

integration:
  identity:
    base-url: ${IDENTITY_BASE_URL:http://localhost:8080}
    user-exists-path: ${IDENTITY_USER_EXISTS_PATH:/api/v1/internal/users/{userId}/exists}
    connect-timeout-ms: ${IDENTITY_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${IDENTITY_READ_TIMEOUT_MS:5000}

messaging:
  topics:
    entite-created: ${ENTITY_TOPIC_CREATED:fastlink.entity.created.v1}
    entite-updated: ${ENTITY_TOPIC_UPDATED:fastlink.entity.updated.v1}
    entite-deleted: ${ENTITY_TOPIC_DELETED:fastlink.entity.deleted.v1}
    member-assigned: ${ENTITY_TOPIC_MEMBER_ASSIGNED:fastlink.entity.member.assigned.v1}

logging:
  level:
    org.springframework.web: INFO
